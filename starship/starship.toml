# ── Starship prompt — robbyrussell style ─────────────────────────────────────
add_newline = false

format = "$conda$directory$git_branch$git_status$cmd_duration$line_break$character"

[conda]
format = "($environment) "
symbol = ""
ignore_base = false

[directory]
style = "cyan bold"
truncation_length = 1
truncate_to_repo = false
format = "[$path]($style) "

[git_branch]
format = "git:([($branch)](bold red))"
symbol = ""

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold red"
conflicted = "✗"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[nodejs]
disabled = true

[terraform]
disabled = true
