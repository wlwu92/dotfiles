# в”Ђв”Ђ Starship prompt вЂ” robbyrussell exact match в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Output: (base) вћњ  infra git:(main) вњ—
add_newline = false

format = "$conda$character  $directory$git_branch$git_status"

[conda]
format = "($environment) "
symbol = ""
ignore_base = false

[character]
success_symbol = "[вћњ](bold green)"
error_symbol = "[вћњ](bold red)"

[directory]
style = "cyan"
truncation_length = 1
truncate_to_repo = false
format = "[$path]($style) "

[git_branch]
format = "[git:\\(](bold blue)[$branch](red)"
symbol = ""

[git_status]
# clean: )(blue)   dirty: )(blue) вњ—(yellow)
format = "[\\)](blue)[$all_status](yellow)"
conflicted = " вњ—"
ahead = " вњ—"
behind = " вњ—"
diverged = " вњ—"
untracked = " вњ—"
modified = " вњ—"
staged = " вњ—"
renamed = " вњ—"
deleted = " вњ—"

[cmd_duration]
min_time = 2_000
format = " [$duration](yellow)"

[nodejs]
disabled = true

[terraform]
disabled = true
