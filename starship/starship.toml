# ── Starship prompt — robbyrussell style ─────────────────────────────────────
# Output: (base) ➜  infra git:(main) !
add_newline = false

format = "$conda$character  $directory$git_branch$git_status$cmd_duration"

[conda]
format = "($environment) "
symbol = ""
ignore_base = false

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
style = "cyan bold"
truncation_length = 1
truncate_to_repo = false
format = "[$path]($style) "

[git_branch]
format = "[git:($branch)]($style)"
style = "bold red"
symbol = ""

[git_status]
format = "[ $all_status$ahead_behind]($style)"
style = "bold red"
conflicted = "✗"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
untracked = ""
modified = "!"
staged = "+"
renamed = ""
deleted = ""

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "yellow"

[nodejs]
disabled = true

[terraform]
disabled = true
