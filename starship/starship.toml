# ── Starship prompt — robbyrussell exact match ────────────────────────────────
# Output: (base) ➜  infra git:(main) ✗
add_newline = false

format = "$conda$character  $directory$git_branch$git_status$cmd_duration"

[conda]
format = "($environment) "
symbol = ""
ignore_base = false

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
style = "cyan"
truncation_length = 1
truncate_to_repo = false
format = "[$path]($style) "

[git_branch]
format = "[git:(](bold blue)[$branch](red)"
symbol = ""

[git_status]
# clean: )(blue)   dirty: )(blue) ✗(yellow)
format = "[)](blue)[$all_status](yellow)"
conflicted = " ✗"
ahead = " ✗"
behind = " ✗"
diverged = " ✗"
untracked = " ✗"
modified = " ✗"
staged = " ✗"
renamed = " ✗"
deleted = " ✗"

[cmd_duration]
min_time = 2_000
format = " [$duration](yellow)"

[nodejs]
disabled = true

[terraform]
disabled = true
